                                                                                                                                                                                        <script>
                                                                                                                                                                                        'use strict';

                                                                                                                                                                                        /**
                                                                                                                                                                                         * 3D GRAPH AUTOMATON - SIMPLIFIED & DEBUGGED
                                                                                                                                                                                          * Co-created by Professor & Student, with Lab Assistants Dr. Hopper, Carmack, & Shader.
                                                                                                                                                                                           */

                                                                                                                                                                                           // ── Rendering Setup ──────────────────────────────────────────────
                                                                                                                                                                                           const CV = document.getElementById('c');
                                                                                                                                                                                           const GV = document.getElementById('glow');
                                                                                                                                                                                           const C = CV.getContext('2d', { alpha: false });
                                                                                                                                                                                           const G = GV.getContext('2d', { alpha: false });
                                                                                                                                                                                           const GS = 0.35; // Glow resolution scale

                                                                                                                                                                                           let W, H, GW, GH, cx, cy;
                                                                                                                                                                                           const FL = 700; // Focal length for 3D projection

                                                                                                                                                                                           function resize() {
                                                                                                                                                                                             W = CV.width = window.innerWidth;
                                                                                                                                                                                               H = CV.height = window.innerHeight;
                                                                                                                                                                                                 cx = W / 2; cy = H / 2;
                                                                                                                                                                                                   GW = GV.width = Math.ceil(W * GS);
                                                                                                                                                                                                     GH = GV.height = Math.ceil(H * GS);
                                                                                                                                                                                                     }
                                                                                                                                                                                                     resize();
                                                                                                                                                                                                     window.addEventListener('resize', resize);

                                                                                                                                                                                                     // ── Magical Bioluminescent Palettes ──────────────────────────────
                                                                                                                                                                                                     const PALETTES =[
                                                                                                                                                                                                       { name: 'Abyssal Ghost',   hD: 210, s: 80, l: 15, hB: 180, lB: 85 },
                                                                                                                                                                                                         { name: 'Neural Bloom',    hD: 280, s: 70, l: 15, hB: 320, lB: 80 },
                                                                                                                                                                                                           { name: 'Toxic Flora',     hD: 150, s: 80, l: 12, hB: 110, lB: 85 },
                                                                                                                                                                                                             { name: 'Solar Corona',    hD: 15,  s: 90, l: 18, hB: 45,  lB: 90 },
                                                                                                                                                                                                               { name: 'Deep Amethyst',   hD: 260, s: 65, l: 15, hB: 285, lB: 85 }
                                                                                                                                                                                                               ];

                                                                                                                                                                                                               const GENUS =['Astrocyte', 'Radiolaria', 'Bathybius', 'Noctiluca', 'Eudendrium'];
                                                                                                                                                                                                               const SPEC =['luminescens', 'fractalis', 'synaptica', 'abyssalis', 'morphica'];

                                                                                                                                                                                                               // ── 3D Node Class ────────────────────────────────────────────────
                                                                                                                                                                                                               class Node3D {
                                                                                                                                                                                                                 constructor(nx, ny, nz) {
                                                                                                                                                                                                                     // Base un-deformed directions
                                                                                                                                                                                                                         this.dirX = nx; this.dirY = ny; this.dirZ = nz;
                                                                                                                                                                                                                             
                                                                                                                                                                                                                                 // Deformed starting position
                                                                                                                                                                                                                                     this.bx = nx; this.by = ny; this.bz = nz;
                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                             // CA State: 0 (Rest), 1 (Fire), 2 (Refractory)
                                                                                                                                                                                                                                                 this.state = 0; 
                                                                                                                                                                                                                                                     this.nextState = 0;
                                                                                                                                                                                                                                                         this.neighbors =[];
                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                 // Visuals
                                                                                                                                                                                                                                                                     this.bulge = 0;
                                                                                                                                                                                                                                                                         this.cilia =[]; // Array of 3D trailing points
                                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                                 // Projection cache
                                                                                                                                                                                                                                                                                     this.sx = 0; this.sy = 0; this.scale = 1; this.depth = 0;
                                                                                                                                                                                                                                                                                       }
                                                                                                                                                                                                                                                                                       }

                                                                                                                                                                                                                                                                                       // ── Organism Definition ──────────────────────────────────────────
                                                                                                                                                                                                                                                                                       class GraphOrganism3D {
                                                                                                                                                                                                                                                                                         constructor() {
                                                                                                                                                                                                                                                                                             this.nodes = [];
                                                                                                                                                                                                                                                                                                 this.edges =[];
                                                                                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                                                                         this.rx = 0; this.ry = 0; this.rz = 0;
                                                                                                                                                                                                                                                                                                             this.targetRx = 0; this.targetRy = 0;
                                                                                                                                                                                                                                                                                                                 
                                                                                                                                                                                                                                                                                                                     this.evolve();
                                                                                                                                                                                                                                                                                                                       }

                                                                                                                                                                                                                                                                                                                         evolve() {
                                                                                                                                                                                                                                                                                                                             this.pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
                                                                                                                                                                                                                                                                                                                                 this.name = GENUS[Math.floor(Math.random() * GENUS.length)] + ' ' + SPEC[Math.floor(Math.random() * SPEC.length)];
                                                                                                                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                                                                                                         this.numNodes = Math.floor(90 + Math.random() * 60);
                                                                                                                                                                                                                                                                                                                                             this.baseRadius = Math.min(W, H) * 0.22;
                                                                                                                                                                                                                                                                                                                                                 
                                                                                                                                                                                                                                                                                                                                                     // Math logic for organic shape deformation
                                                                                                                                                                                                                                                                                                                                                         this.noiseFreq = 1.5 + Math.random() * 2.0;
                                                                                                                                                                                                                                                                                                                                                             this.noiseAmp = 0.2 + Math.random() * 0.7; // Higher = more alien/spiky
                                                                                                                                                                                                                                                                                                                                                                 this.noiseSeed = Math.random() * 100;
                                                                                                                                                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                                                                                                                                         this.caThreshold = Math.random() > 0.5 ? 1 : 2; 
                                                                                                                                                                                                                                                                                                                                                                             this.spontaneousRate = 0.003 + Math.random() * 0.01;
                                                                                                                                                                                                                                                                                                                                                                                 
                                                                                                                                                                                                                                                                                                                                                                                     this.buildGeometry();
                                                                                                                                                                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                                                                                                                                                             // Trigger CA burst
                                                                                                                                                                                                                                                                                                                                                                                                 this.nodes.forEach(n => { if (Math.random() > 0.8) n.state = 1; });
                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                     // Pure 3D Noise function (Dr. Carmack's optimization)
                                                                                                                                                                                                                                                                                                                                                                                                       getDeformation(x, y, z) {
                                                                                                                                                                                                                                                                                                                                                                                                           let n = Math.sin(x * this.noiseFreq + this.noiseSeed) * 
                                                                                                                                                                                                                                                                                                                                                                                                                       Math.cos(y * this.noiseFreq - this.noiseSeed) * 
                                                                                                                                                                                                                                                                                                                                                                                                                                   Math.sin(z * this.noiseFreq);
                                                                                                                                                                                                                                                                                                                                                                                                                                       return 1 + (n * this.noiseAmp);
                                                                                                                                                                                                                                                                                                                                                                                                                                         }

                                                                                                                                                                                                                                                                                                                                                                                                                                           buildGeometry() {
                                                                                                                                                                                                                                                                                                                                                                                                                                               this.nodes =[];
                                                                                                                                                                                                                                                                                                                                                                                                                                                   this.edges =[];
                                                                                                                                                                                                                                                                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                                                                                                                                                                                                           // Fibonacci Sphere Distribution
                                                                                                                                                                                                                                                                                                                                                                                                                                                               const phi = Math.PI * (3 - Math.sqrt(5)); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                   for (let i = 0; i < this.numNodes; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                         let y = 1 - (i / (this.numNodes - 1)) * 2; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                               let radius = Math.sqrt(1 - y * y);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     let theta = phi * i;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 let nx = Math.cos(theta) * radius;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       let nz = Math.sin(theta) * radius;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   let node = new Node3D(nx, y, nz);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               // Deform shape
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     let def = this.getDeformation(nx, y, nz);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           node.bx = nx * this.baseRadius * def;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 node.by = y  * this.baseRadius * def;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       node.bz = nz * this.baseRadius * def;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   // If node is a "spike" (protrudes outward), give it tentacles
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         if (def > 1.0 + (this.noiseAmp * 0.3)) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 let numSegs = 6 + Math.floor(Math.random() * 8);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         for(let j=0; j<numSegs; j++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   node.cilia.push({ x: node.bx, y: node.by, z: node.bz });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       this.nodes.push(node);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   // Connect Nearest Neighbors
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       for (let i = 0; i < this.nodes.length; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             let n1 = this.nodes[i];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   let distances =[];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         for (let j = 0; j < this.nodes.length; j++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if (i === j) continue;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         let n2 = this.nodes[j];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 let d = (n1.bx-n2.bx)**2 + (n1.by-n2.by)**2 + (n1.bz-n2.bz)**2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         distances.push({ node: n2, d: d });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     distances.sort((a, b) => a.d - b.d);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 for (let k = 0; k < 4; k++) { // Connect to 4 nearest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         let target = distances[k].node;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 if (!n1.neighbors.includes(target)) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           n1.neighbors.push(target);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     target.neighbors.push(n1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               this.edges.push({ a: n1, b: target });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     update(frameCount) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         // 1. Smooth rotation + Idle drift (Dr. Shader's request)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             this.rx += ((this.targetRx + Math.sin(frameCount*0.01)*0.1) - this.rx) * 0.05;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 this.ry += ((this.targetRy + Math.cos(frameCount*0.008)*0.1) - this.ry) * 0.05;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     this.rz += 0.003; 

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         // Precalculate rotation sines/cosines
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             let cY = Math.cos(this.ry), sY = Math.sin(this.ry);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 let cX = Math.cos(this.rx), sX = Math.sin(this.rx);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     let cZ = Math.cos(this.rz), sZ = Math.sin(this.rz);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         // 2. Cellular Automata Propagation
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             if (frameCount % 6 === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   for (let n of this.nodes) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           if (n.state === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     let active = n.neighbors.filter(neighbor => neighbor.state === 1).length;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               if (active >= this.caThreshold || Math.random() < this.spontaneousRate) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           n.nextState = 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 n.nextState = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   } else if (n.state === 1) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             n.nextState = 2;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     } else {
